<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexValo // Vanguard Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ───── HEADER ───── -->
  <header class="site-header">
    <div class="header-brand">
      <span class="brand-slash">//</span>
      <span class="brand-name">NEX<span class="brand-accent">VALO</span></span>
      <span class="brand-sub">VANGUARD DASHBOARD</span>
    </div>
    <div class="header-status" id="system-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">SYSTEM NOMINAL</span>
    </div>
  </header>

  <!-- ───── LAYOUT ───── -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="section-label">AGENT CONTROL</h3>
        <button class="btn btn-primary" id="btn-sync">
          <span class="btn-icon">&#9654;</span> SYNC AGENTS
        </button>
        <div class="locked-agent-panel" id="locked-panel">
          <div class="locked-label">LOCKED AGENT</div>
          <div class="locked-name" id="locked-name">— NONE —</div>
          <div class="locked-role" id="locked-role"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="section-label">VANGUARD SECURITY</h3>
        <div class="token-input-wrap">
          <label class="input-label">ACCESS TOKEN</label>
          <input
            type="text"
            class="token-input"
            id="token-input"
            placeholder="Enter security token..."
            value="VANGUARD-7749-NEXVALO"
          />
        </div>
        <button class="btn btn-danger" id="btn-scan">
          <span class="btn-icon">&#9888;</span> RUN VANGUARD SCAN
        </button>
      </div>

      <div class="sidebar-section">
        <h3 class="section-label">CACHE STATUS</h3>
        <div class="cache-info" id="cache-info">
          <div class="cache-row"><span>Entries:</span><span id="cache-entries">0</span></div>
          <div class="cache-row"><span>Active Keys:</span><span id="cache-keys">—</span></div>
        </div>
        <button class="btn btn-ghost" id="btn-cache">REFRESH CACHE</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- AGENT GRID -->
      <section class="agents-section">
        <div class="section-header">
          <h2 class="section-title">AGENT ROSTER</h2>
          <span class="agent-count" id="agent-count">0 AGENTS</span>
        </div>
        <div class="agent-grid" id="agent-grid">
          <div class="grid-placeholder" id="grid-placeholder">
            <div class="placeholder-icon">&#9654;</div>
            <p>Press <strong>SYNC AGENTS</strong> to load the roster</p>
          </div>
        </div>
      </section>

      <!-- SYSTEM CONSOLE -->
      <section class="console-section">
        <div class="console-header">
          <span class="console-title">// SYSTEM CONSOLE</span>
          <button class="btn-clear" id="btn-clear-console">CLEAR</button>
        </div>
        <div class="console-body" id="console-body">
          <div class="console-line console-boot">
            <span class="con-time">00:00:00</span>
            <span class="con-tag tag-info">[BOOT]</span>
            <span class="con-msg">NexValo Vanguard Dashboard initialized. Awaiting commands.</span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
